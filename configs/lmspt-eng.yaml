# Speech tokenizer recon 음성 품질 MUSHRA 평가 (영어)
# 사용법: http://localhost:8000?config=lmspt_eng.yaml
# mos-test와 동일하게 10개 음성, 모델마다 동일 10개로 다양하게 샘플링

testname: Tokenizer Reconstruction MUSHRA 평가
testId: lmspt-eng
bufferSize: 2048
stopOnErrors: true
showButtonPreviousPage: true
remoteService: service/write.php

pages:
  # 시작 안내 페이지
  - type: generic
    id: welcome
    name: Welcome
    content: |
      <p>본 실험에 참여해 주셔서 감사합니다.</p>
      <ul>
        <li><strong>Reference</strong>: 100점의 기준이 되는 GT(원본) 음성입니다.</li>
        <li>문항당 <strong>5개</strong>의 음성에 대해 Reference를 기준으로 품질을 평가해 주세요.</li>
        <li>1~100점 척도로 <strong>음성의 품질</strong>만 평가해 주세요.</li>
      </ul>
      <p>아래 "Next" 버튼을 클릭하여 시작하세요.</p>

  - type: mushra
    id: item_1
    name: 문항 1
    content: 5개 조건에 대해, 음성의 품질만 1~100점으로 평가해 주세요.
    showWaveform: true
    enableLooping: true
    reference: configs/resources/recon_eval_data/gt/0nH78dDh0N0_00013.wav
    createAnchor35: false
    createAnchor70: false
    randomize: true
    showConditionNames: false
    stimuli:
      dualcodec: configs/resources/recon_eval_data/dualcodec/0nH78dDh0N0_00013.wav
      lmspt-dc: configs/resources/recon_eval_data/lmspt-dc/0nH78dDh0N0_00013.wav
      lmspt-mimi: configs/resources/recon_eval_data/lmspt-mimi/0nH78dDh0N0_00013.wav
      mimi: configs/resources/recon_eval_data/mimi/0nH78dDh0N0_00013.wav

